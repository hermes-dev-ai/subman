version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: subman
      POSTGRES_USER: subman
      POSTGRES_PASSWORD: subman***2026
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U subman"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./server/auth-service
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: "postgresql://subman:***@db:5432/subman?schema=public"
      JWT_SECRET: "subman***-key-2026"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
