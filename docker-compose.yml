version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: subman
      POSTGRES_USER: subman
      POSTGRES_PASSWORD: subman***2026
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./server/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U subman"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgrest:
    image: postgrest/postgrest:v12
    ports:
      - "3000:3000"
    environment:
      PGRST_DB_URI: "postgres://subman:***@db:5432/subman"
      PGRST_DB_SCHEMA: "public"
      PGRST_DB_ANON_ROLE: "subman_anon"
      PGRST_JWT_SECRET: "change...-secret-key-2026"
      PGRST_DB_PRE_REQUEST: "public.set_custom_headers"
    depends_on:
      db:
        condition: service_healthy

  auth-service:
    build: ./server/auth-service
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: "postgres://subman:***@db:5432/subman"
      JWT_SECRET: "change...-secret-key-2026"
      PORT: 3001
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
